<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Lul Downloader</title>
  <meta name="description" content="Lul Downloader se contact karo — suggestions, bugs, ya DMCA requests ke liye.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="nav">
      <a href="index.html" class="logo">🎵 Lul<span>Downloader</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="how-to-use.html">How to Use</a>
        <a href="faq.html">FAQ</a>
        <a href="history.html">History</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
      </div>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h1>📬 Contact Karo</h1>
      <p>Hum aapki baat sunna chahte hain</p>
    </div>
    <section class="section">
      <div class="container" style="max-width:600px;">
        <div class="alert">⚡ DMCA request ke liye directly <a href="dmca.html" style="color:var(--accent);font-weight:600;">DMCA page</a> dekho.</div>
        <div class="card">
          <form onsubmit="submitContact(event)">
            <div class="form-group">
              <label>Aapka Naam</label>
              <input type="text" placeholder="Jaise: Rahul Kumar" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="yourname@email.com" required>
            </div>
            <div class="form-group">
              <label>Subject</label>
              <select>
                <option>General Question</option>
                <option>Bug Report</option>
                <option>Feature Request</option>
                <option>DMCA / Copyright</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea placeholder="Apna message yahan likhein..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Send Message 📨</button>
          </form>
        </div>
        <div style="margin-top:24px;text-align:center;color:var(--text-muted);font-size:0.88rem;">
          <p>Hum 24-48 ghante mein respond karte hain.</p>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <div class="footer-content container">
      <div class="footer-logo">🎵 Lul<span>Downloader</span></div>
      <div class="footer-links">
        <a href="index.html">Home</a><a href="about.html">About</a><a href="privacy-policy.html">Privacy Policy</a><a href="disclaimer.html">Disclaimer</a><a href="terms.html">Terms</a><a href="dmca.html">DMCA</a><a href="contact.html">Contact</a>
      </div>
      <p class="footer-copy">© 2025 LulDownloader</p>
    </div>
  </footer>
  <script>
    function submitContact(e) {
      e.preventDefault();
      alert('Message bhej diya! Hum jaldi respond karenge. 🙏');
      e.target.reset();
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
