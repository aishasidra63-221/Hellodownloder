kind = "web"
previewPath = "/"
title = "TikTok Downloader"
version = "1.0.0"
id = "artifacts/tikdown"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25828

[services.development]
run = "pnpm --filter @workspace/tikdown run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tikdown", "run", "build" ]
publicDir = "artifacts/tikdown/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25828"
BASE_PATH = "/"
